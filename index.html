const CONSULTORIO = { nombre:'PSONRIE', subtitulo:'Psicología Deportiva · Lic. Celman Felman Yáñez Roca', logoUrl:'' };

const REGLAS_RECOMENDACION = [
  {cond:m=> m.csai2?.completed && m.csai2.scores.somatica>=3, categoria:'Regulación de activación', tecnica:'respiracion', motivo:'Activación somática elevada en el CSAI-2R', prioridad:'alta'},
  {cond:m=> m.sas2?.completed && m.sas2.scores.somatica>=3, categoria:'Regulación de activación', tecnica:'respiracion', motivo:'Ansiedad somática elevada en el SAS-2', prioridad:'alta'},
  {cond:m=> m.csai2?.completed && m.csai2.scores.cognitiva>=3, categoria:'Diálogo interno', tecnica:'autohabla', motivo:'Ansiedad cognitiva elevada (preocupación excesiva) en el CSAI-2R', prioridad:'alta'},
  {cond:m=> m.pss14?.completed && m.pss14.scores.total>=27, categoria:'Regulación de activación', tecnica:'relajacion_progresiva', motivo:'Estrés percibido general alto (PSS-14)', prioridad:'alta'},
  {cond:m=> m.abq?.completed && m.abq.scores.agotamiento>=3.5, categoria:'Recuperación', tecnica:'relajacion_progresiva', motivo:'Agotamiento físico/emocional elevado (ABQ)', prioridad:'alta'},
  {cond:m=> m.mood?.completed && m.mood.scores.perturbacionTotal>=4, categoria:'Regulación anímica', tecnica:'respiracion', motivo:'Perturbación anímica elevada en el estado de ánimo pre-competitivo', prioridad:'media'},
  {cond:m=> m.sms28?.completed && (m.sms28.scores.amotivacion>=4 || m.sms28.scores.indiceAutodeterminacion<0), categoria:'Motivación', tecnica:'metas', motivo:'Amotivación elevada o motivación predominantemente controlada (SMS-28)', prioridad:'alta'},
  {cond:m=> m.teosq?.completed && (m.teosq.scores.ego - m.teosq.scores.tarea) > 0.5, categoria:'Motivación', tecnica:'metas', motivo:'Orientación al ego dominante sobre la tarea (TEOSQ)', prioridad:'media'},
  {cond:m=> m.autoeficacia?.completed && m.autoeficacia.scores.error<2.5, categoria:'Tolerancia al error', tecnica:'autohabla', motivo:'Baja autoeficacia para recuperarse tras cometer un error', prioridad:'alta'},
  {cond:m=> m.autoeficacia?.completed && m.autoeficacia.scores.presion<2.5, categoria:'Control bajo presión', tecnica:'centering', motivo:'Baja autoeficacia en momentos de presión', prioridad:'alta'},
  {cond:m=> m.fss2?.completed && (m.fss2.scores.control<3 || m.fss2.scores.autoconciencia<3), categoria:'Concentración', tecnica:'centering', motivo:'Baja sensación de control o alta autoconciencia durante la competencia (FSS-2)', prioridad:'media'},
  {cond:m=> m.fss2?.completed && m.fss2.scores.equilibrio<3, categoria:'Concentración', tecnica:'rutina_precompetitiva', motivo:'Desajuste entre el desafío percibido y la habilidad (FSS-2)', prioridad:'media'},
  {cond:m=> m.geq?.completed && m.geq.scores.global<4, categoria:'Comunicación y cohesión', tecnica:null, motivo:'Cohesión de equipo baja (GEQ) — trabajar en conjunto con el cuerpo técnico; la biblioteca actual no tiene una técnica individual para esto', prioridad:'media'},
  {cond:m=> m.reaction_choice?.completed && m.reaction_choice.scores.noGoTotal && (m.reaction_choice.scores.commissions/m.reaction_choice.scores.noGoTotal)>0.3, categoria:'Control inhibitorio', tecnica:'centering', motivo:'Tasa alta de errores de comisión en la tarea Go/No-Go (impulsividad)', prioridad:'alta'},
  {cond:m=> m.atencion_sostenida?.completed && (m.atencion_sostenida.scores.omissions>5 || (m.atencion_sostenida.scores.firstHalfHitRate!=null && m.atencion_sostenida.scores.secondHalfHitRate!=null && (m.atencion_sostenida.scores.firstHalfHitRate-m.atencion_sostenida.scores.secondHalfHitRate)>0.25)), categoria:'Atención sostenida', tecnica:'grilla_concentracion', motivo:'Omisiones elevadas o caída atencional en la tarea de atención sostenida (CPT)', prioridad:'alta'},
  {cond:m=> m.memoria_nback?.completed && m.memoria_nback.scores.precision<60, categoria:'Memoria de trabajo', tecnica:'visualizacion', motivo:'Precisión baja en la tarea de memoria de trabajo (n-back)', prioridad:'media'},
  {cond:m=> m.reaction_simple?.completed && m.reaction_simple.scores.sd>100, categoria:'Consistencia atencional', tecnica:'centering', motivo:'Alta variabilidad en el tiempo de reacción simple', prioridad:'media'},
];

function buildRecomendacionesTecnicas(m){
  const activas = REGLAS_RECOMENDACION.filter(r=>{ try{ return !!r.cond(m); }catch(e){ return false; } });
  if(activas.length===0){
    return '<p class="hint">No se detectaron áreas que requieran una técnica prioritaria según los resultados registrados en esta evaluación. Se sugiere mantener el trabajo preventivo habitual.</p>';
  }
  const porCategoria = {};
  activas.forEach(r=>{ (porCategoria[r.categoria] = porCategoria[r.categoria]||[]).push(r); });
  let html = '';
  Object.keys(porCategoria).forEach(cat=>{
    const items = porCategoria[cat].slice().sort((a,b)=> (a.prioridad==='alta'?0:1)-(b.prioridad==='alta'?0:1));
    html += `<div style="margin-bottom:14px;"><strong style="color:var(--primary-dark);">${esc(cat)}</strong><ul style="margin-top:6px;">`;
    items.forEach(r=>{
      const tecLabel = r.tecnica ? ((TECHNIQUES[r.tecnica]||{}).label || r.tecnica) : null;
      const badge = r.prioridad==='alta' ? '<span class="badge rojo"><span class="ring"></span>Prioritario</span>' : '<span class="badge amarillo"><span class="ring"></span>A considerar</span>';
      html += `<li style="margin-bottom:4px;">${tecLabel? `<strong>${esc(tecLabel)}</strong> — `:''}${esc(r.motivo)} ${badge}</li>`;
    });
    html += `</ul></div>`;
  });
  return html;
}

function fmtPct(hits,total){ return total? Math.round((hits/total)*100)+'%' : '—'; }
function buildReporteCompleto(){
  const a = currentAthlete;
  const e = currentEvaluation;
  const today = new Date().toLocaleDateString('es-BO');

    const filas = Object.keys(s).filter(k=>typeof s[k]==='number' || typeof s[k]==='string' || typeof s[k]==='boolean')

    `<table class="report-table"><tr><th>Técnica</th><th>Fecha</th><th>Detalle</th></tr>

  return `<div class="report-portada">
    ${CONSULTORIO.logoUrl? `<img src="${CONSULTORIO.logoUrl}" style="max-height:90px;margin-bottom:22px;">`:''}

    <div class="portada-linea"></div>

    <div class="portada-meta">${esc(a.deporte||'')}${a.categoria? ' · '+esc(a.categoria):''}<br>Evaluación del ${esc(e.fecha_evaluacion)}<br>Evaluador/a: ${esc(e.evaluador)||'—'}</div>
  </div>

  <div class="report-page">
    <div class="report-header">
      <div><div class="report-title">Informe de Evaluación Psicodeportiva</div><div style="color:var(--gray);font-size:13px;">Batería Psicodeportiva Integral (BPI)</div></div>
      <div class="report-meta">Fecha del informe: ${today}<br>Evaluador/a: ${esc(e.evaluador)||'—'}</div>
    </div>

    <div class="report-section"><h3>1. Datos del deportista</h3>
      <table class="report-table">
        <tr><th>Nombre</th><td>${esc(a.nombre)}</td><th>Edad</th><td>${a.edad||'—'}</td></tr>
        <tr><th>Deporte</th><td>${esc(a.deporte||'—')}</td><th>Modalidad</th><td>${esc(a.modalidad||'—')}</td></tr>
        <tr><th>Categoría</th><td>${esc(a.categoria||'—')}</td><th>Nivel competitivo</th><td>${esc(a.nivel_competitivo||'—')}</td></tr>
        <tr><th>Club</th><td>${esc(a.club||'—')}</td><th>Entrenador</th><td>${esc(a.entrenador||'—')}</td></tr>
        <tr><th>Fecha de evaluación</th><td>${esc(e.fecha_evaluacion)}</td><th>Contexto</th><td>${esc(e.contexto||'—')}</td></tr>
      </table>
      ${a.motivo_evaluacion? `<p><strong>Motivo de evaluación:</strong> ${esc(a.motivo_evaluacion)}</p>`:''}
      ${a.lesiones? `<p><strong>Lesiones relevantes:</strong> ${esc(a.lesiones)}</p>`:''}

    <div class="report-section"><h3>2. Ansiedad y Estrés</h3>
      ${GRUPO_ANSIEDAD.map(seccionInstrumento).join('')}

      ${GRUPO_MOTIVACION.map(seccionInstrumento).join('')}

    <div class="signature-block">

      <div class="sig-line">Sello / Registro profesional</div>
    </div>
  </div>`;
}
