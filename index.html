<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPI · Batería Psicodeportiva Integral</title>
<style>
  :root{
    --ink:#1B2A3A; --bg:#EEF2F6; --panel:#FFFFFF;
    --primary:#2C5F7C; --primary-dark:#1E4459; --accent:#6B9AB0;
    --verde:#3E8E5A; --verde-bg:#E7F4EC;
    --amarillo:#B8862E; --amarillo-bg:#FBF3E1;
    --rojo:#C0524A; --rojo-bg:#FBEBE9;
    --gray:#66798C; --border:#DCE4EA;
    --mono:"Consolas","SFMono-Regular",Menlo,monospace;
    --serif:Georgia,"Times New Roman",serif;
    --sans:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14.5px;}
  h1,h2,h3{font-family:var(--serif);font-weight:600;color:var(--primary-dark);margin:0 0 .4em;}
  .app{display:flex;min-height:100vh;}
  .sidebar{width:250px;flex-shrink:0;background:var(--primary-dark);color:#EAF1F5;display:flex;flex-direction:column;padding:22px 0;}
  .brand{padding:0 20px 18px;border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:14px;}
  .brand .title{font-family:var(--serif);font-size:19px;color:#fff;}
  .brand .sub{font-size:11px;color:#A9C2CE;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:#D3E1E8;font-size:13.5px;}
  .nav-item:hover{background:rgba(255,255,255,.06);}
  .nav-item.active{background:rgba(255,255,255,.1);font-weight:600;color:#fff;}
  .user-chip{margin-top:auto;padding:14px 20px;font-size:12px;color:#A9C2CE;border-top:1px solid rgba(255,255,255,.15);}
  .user-chip button{margin-top:8px;width:100%;}
  .main{flex:1;padding:32px 40px;max-width:980px;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:28px 32px;margin-bottom:22px;}
  .panel-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);}
  .eyebrow{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:3px;}
  label{display:block;font-size:13px;color:var(--gray);margin-bottom:4px;font-weight:600;}
  input[type=text],input[type=email],input[type=password],input[type=date],input[type=number],textarea,select{
    width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);font-size:14px;color:var(--ink);background:#FCFDFE;margin-bottom:14px;
  }
  textarea{min-height:70px;resize:vertical;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 20px;}
  button{font-family:var(--sans);cursor:pointer;border:none;border-radius:6px;padding:10px 18px;font-size:13.5px;font-weight:600;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-ghost{background:transparent;color:var(--primary);border:1px solid var(--primary);}
  .btn-danger{background:transparent;color:var(--rojo);border:1px solid var(--rojo);}
  .btn-row{display:flex;gap:10px;margin-top:16px;}
  .error-box{background:var(--rojo-bg);color:var(--rojo);border:1px solid #E9C0BC;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;}
  .ok-box{background:var(--verde-bg);color:var(--verde);border:1px solid #BFE0CC;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;}
  .hint{font-size:12px;color:var(--gray);margin:-8px 0 14px;font-style:italic;}
  .athlete-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;}
  .athlete-row:hover{border-color:var(--accent);}
  .athlete-row .aname{font-weight:700;font-size:15px;}
  .athlete-row .ameta{color:var(--gray);font-size:12.5px;margin-top:2px;}
  .tag{display:inline-block;background:#F1F6F9;color:var(--primary);border-radius:12px;padding:2px 10px;font-size:11px;font-weight:600;margin-right:6px;}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  .login-box{background:#fff;border:1px solid var(--border);border-radius:12px;padding:36px 40px;width:360px;}
  .login-box .brand-title{font-family:var(--serif);font-size:24px;color:var(--primary-dark);text-align:center;margin-bottom:4px;}
  .login-box .brand-sub{text-align:center;color:var(--gray);font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:24px;}
  .eval-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:1px solid var(--border);border-radius:6px;margin-bottom:8px;font-size:13px;}
  .badge-estado{padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;}
  .badge-estado.en_progreso{background:var(--amarillo-bg);color:var(--amarillo);}
  .badge-estado.completa{background:var(--verde-bg);color:var(--verde);}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- Módulos psicológicos ---------- */
  .module-card{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;}
  .module-card .mname{font-weight:700;font-size:14.5px;}
  .module-card .mdesc{color:var(--gray);font-size:12px;margin-top:2px;}
  .status-pill{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;}
  .status-pill.pendiente{background:#F1F4F7;color:var(--gray);}
  .status-pill.completo{background:var(--verde-bg);color:var(--verde);}
  .qsection-title{margin:22px 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--primary);font-weight:700;border-bottom:2px solid var(--border);padding-bottom:6px;}
  .qrow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid #F0F3F6;}
  .qtext{font-size:13.8px;line-height:1.4;}
  .qtext .qnum{color:var(--accent);font-family:var(--mono);margin-right:6px;}
  .scale{display:flex;gap:4px;}
  .scale label.opt{display:flex;flex-direction:column;align-items:center;font-size:9.5px;color:var(--gray);font-weight:400;margin:0;width:60px;text-align:center;cursor:pointer;}
  .scale input{margin-bottom:3px;cursor:pointer;}
  .score-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:16px;}
  .cancel-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:12px 16px;background:#F4F7F9;border-radius:8px;}
  .cancel-timer{font-family:var(--mono);font-size:22px;color:var(--primary-dark);font-weight:700;}
  .score-card{border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
  .score-card .sc-label{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--gray);font-weight:700;}
  .score-card .sc-value{font-family:var(--mono);font-size:22px;margin:4px 0;}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;}
  .badge .ring{width:9px;height:9px;border-radius:50%;}
  .badge.verde{background:var(--verde-bg);color:var(--verde);}
  .badge.verde .ring{background:var(--verde);}
  .badge.amarillo{background:var(--amarillo-bg);color:var(--amarillo);}
  .badge.amarillo .ring{background:var(--amarillo);}
  .badge.rojo{background:var(--rojo-bg);color:var(--rojo);}
  .badge.rojo .ring{background:var(--rojo);}
  .interpretation-box{background:#F7FAFB;border-left:4px solid var(--primary);border-radius:6px;padding:16px 18px;margin-top:14px;font-size:13.8px;line-height:1.7;}

  /* ---------- Biblioteca de técnicas ---------- */
  .tec-grid-numbers{display:grid;grid-template-columns:repeat(10,44px);gap:4px;margin:16px 0;}
  .tec-cell{width:44px;height:44px;border:1px solid var(--border);border-radius:6px;background:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;cursor:pointer;}
  .tec-cell.found{background:var(--verde-bg);color:var(--verde);border-color:var(--verde);}
  .breath-circle{width:180px;height:180px;border-radius:50%;background:var(--accent);margin:30px auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;transition:transform 3.8s ease-in-out;}
  .tec-history{margin-top:20px;border-top:1px solid var(--border);padding-top:14px;}
  .tec-history-item{font-size:12.5px;color:var(--gray);padding:6px 0;border-bottom:1px solid #F0F3F6;}
  .category-tag{display:inline-block;background:#F1F6F9;color:var(--primary);border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700;margin-bottom:6px;}

  /* ---------- Informe imprimible ---------- */
  .report-page{background:#fff;}
  .report-portada{background:#fff;text-align:center;padding:110px 40px 60px;page-break-after:always;}
  .portada-consultorio{font-family:var(--serif);font-size:30px;color:var(--primary-dark);letter-spacing:.5px;}
  .portada-subtitulo{font-size:13px;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-top:6px;}
  .portada-linea{width:80px;height:3px;background:var(--accent);margin:34px auto;border-radius:2px;}
  .portada-titulo{font-family:var(--serif);font-size:22px;color:var(--ink);margin-bottom:24px;}
  .portada-atleta{font-size:26px;font-weight:700;color:var(--primary-dark);margin-bottom:10px;}
  .portada-meta{font-size:13.5px;color:var(--gray);line-height:1.8;}
  .report-header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid var(--primary);padding-bottom:14px;margin-bottom:22px;}
  .report-title{font-family:var(--serif);font-size:24px;color:var(--primary-dark);}
  .report-meta{text-align:right;font-size:12px;color:var(--gray);}
  .report-section{margin-bottom:26px;page-break-inside:avoid;}
  .report-section h3{font-size:15px;text-transform:uppercase;letter-spacing:.8px;color:var(--primary);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:10px;}
  table.report-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px;}
  table.report-table th,table.report-table td{border:1px solid var(--border);padding:6px 10px;text-align:left;}
  table.report-table th{background:#F4F7F9;}
  .signature-block{margin-top:60px;display:flex;justify-content:space-between;}
  .sig-line{border-top:1px solid var(--ink);width:260px;text-align:center;padding-top:6px;font-size:12px;color:var(--gray);}

  @media print{
    .sidebar, .no-print { display:none !important; }
    #reportPanel { display:block !important; border:none; padding:0; }
    body{background:#fff;}
    .main{max-width:100%;padding:0;}
  }
</style>
</head>
<body>
<div id="root">
  <div class="login-wrap"><div class="login-box"><p style="text-align:center;color:var(--gray);">Cargando…</p></div></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

/* ============================================================
   CONFIGURACIÓN — reemplazá estos dos valores con los de TU
   proyecto de Supabase (Project Settings → API).
   ============================================================ */
const SUPABASE_URL = 'https://oteeceupgmcvstpmgtwl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90ZWVjZXVwZ21jdnN0cG1ndHdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1OTcwNjAsImV4cCI6MjA5OTE3MzA2MH0.jaMCi0O7RGdIfVKCHXRU6OhR3DamSUwuRKTURaZtSos';

const root = document.getElementById('root');
let supabase;
let clientInitError = null;
try{
  supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} catch(err){
  clientInitError = err;
}

let session = null;
let activeView = 'lista';
let athletes = [];
let currentAthleteId = null;
let currentAthlete = null;
let evaluations = [];
let currentEvaluationId = null;
let currentEvaluation = null;
let moduleResults = {}; // { module_key: {raw_data, scores, completed} }
let cog = null; // estado transitorio de la tarea cognitiva interactiva en curso
let tec = null; // estado transitorio de la técnica de entrenamiento mental en curso
let techniqueLogs = []; // historial de práctica de técnicas del deportista actual
let wellnessCheckins = []; // historial de check-ins de bienestar del deportista actual

function esc(s){ return (s===null||s===undefined?'':s.toString()).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ============================================================
   AUTENTICACIÓN
   ============================================================ */
async function init(){
  if(clientInitError){
    root.innerHTML = `<div class="login-wrap"><div class="login-box">
      <div class="brand-title">BPI</div>
      <div class="error-box">El SUPABASE_URL tiene un formato inválido (probablemente falta "https://" al principio, o tiene espacios/comillas de más).<br><br>Detalle técnico: ${esc((clientInitError && clientInitError.message)||String(clientInitError))}</div>
    </div></div>`;
    return;
  }
  if(SUPABASE_URL.includes('PEGA_AQUI') || SUPABASE_ANON_KEY.includes('PEGA_AQUI')){
    root.innerHTML = `<div class="login-wrap"><div class="login-box">
      <div class="brand-title">BPI</div>
      <div class="error-box">Todavía no configuraste las credenciales de Supabase en este archivo. Buscá las líneas SUPABASE_URL y SUPABASE_ANON_KEY cerca del inicio del &lt;script&gt; y reemplazalas por las de tu proyecto (Settings → API Keys en Supabase).</div>
    </div></div>`;
    return;
  }
  try{
    const { data } = await supabase.auth.getSession();
    session = data.session;
    supabase.auth.onAuthStateChange((_event, s)=>{ session = s; render(); });
  } catch(err){
    root.innerHTML = `<div class="login-wrap"><div class="login-box">
      <div class="brand-title">BPI</div>
      <div class="error-box">No se pudo conectar con Supabase. Revisá que el SUPABASE_URL y la clave estén bien copiados (sin espacios ni comillas de más).<br><br>Detalle técnico: ${(err && err.message)||err}</div>
    </div></div>`;
    return;
  }
  render();
}

function renderLogin(errorMsg){
  root.innerHTML = `
  <div class="login-wrap"><div class="login-box">
    <div class="brand-title">BPI</div>
    <div class="brand-sub">Batería Psicodeportiva Integral</div>
    ${errorMsg? `<div class="error-box">${esc(errorMsg)}</div>`:''}
    <label>Correo electrónico</label>
    <input type="email" id="loginEmail">
    <label>Contraseña</label>
    <input type="password" id="loginPassword">
    <div class="btn-row"><button class="btn-primary" style="width:100%;" onclick="window.doLogin()">Ingresar</button></div>
    <p class="hint" style="text-align:center;">Acceso exclusivo para el profesional. El usuario se crea desde el panel de Supabase.</p>
  </div></div>`;
}
window.doLogin = async function(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if(!email || !password){ renderLogin('Completá correo y contraseña.'); return; }
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if(error){ renderLogin('No se pudo iniciar sesión: ' + error.message); return; }
  const { data } = await supabase.auth.getSession();
  session = data.session;
  activeView='lista';
  await loadAthletes();
  render();
};
window.doLogout = async function(){
  await supabase.auth.signOut();
  session = null;
  render();
};

/* ============================================================
   CARGA DE DATOS
   ============================================================ */
async function loadAthletes(){
  const { data, error } = await supabase.from('athletes').select('*').eq('activo', true).order('created_at', {ascending:false});
  if(error){ console.error(error); athletes = []; return; }
  athletes = data || [];
}
async function loadEvaluations(athleteId){
  const { data, error } = await supabase.from('evaluations').select('*').eq('athlete_id', athleteId).order('fecha_evaluacion', {ascending:false});
  if(error){ console.error(error); evaluations = []; return; }
  evaluations = data || [];
}

/* ============================================================
   RENDER PRINCIPAL
   ============================================================ */
function render(){
  if(!session){ renderLogin(); return; }
  let bodyHtml = '';
  if(activeView==='lista') bodyHtml = viewLista();
  else if(activeView==='nuevo') bodyHtml = viewNuevoDeportista();
  else if(activeView==='ficha') bodyHtml = viewFicha();
  else if(activeView==='evaluacion') bodyHtml = viewEvaluacion();
  else if(INSTRUMENTS[activeView]) bodyHtml = viewInstrumento(activeView);
  else if(activeView==='reaction_simple') bodyHtml = viewReactionSimple();
  else if(activeView==='reaction_choice') bodyHtml = viewReactionChoice();
  else if(activeView==='atencion_sostenida') bodyHtml = viewAtencionSostenida();
  else if(activeView==='memoria_nback') bodyHtml = viewMemoriaNback();
  else if(activeView==='tecnicas') bodyHtml = viewTecnicas();
  else if(activeView==='monitoreo') bodyHtml = viewMonitoreo();
  else if(TECHNIQUES[activeView]) bodyHtml = viewTecnicaDetalle(activeView);
  else if(activeView==='informe') bodyHtml = viewInforme();

  root.innerHTML = `
  <div class="app">
    <div class="sidebar">
      <div class="brand"><div class="title">BPI</div><div class="sub">Batería Psicodeportiva</div></div>
      <div class="nav-item ${activeView==='lista'?'active':''}" onclick="window.gotoLista()">Deportistas</div>
      <div class="nav-item ${activeView==='nuevo'?'active':''}" onclick="window.gotoNuevo()">+ Nuevo deportista</div>
      <div class="user-chip">
        Conectado como<br><strong>${esc(session.user.email)}</strong>
        <button class="btn-ghost" style="margin-top:10px;" onclick="window.doLogout()">Cerrar sesión</button>
      </div>
    </div>
    <div class="main" id="mainArea">${bodyHtml}</div>
  </div>`;
}

window.gotoLista = async function(){ activeView='lista'; render(); await loadAthletes(); render(); };
window.gotoNuevo = function(){ activeView='nuevo'; render(); };
window.abrirFicha = async function(id){
  currentAthleteId = id;
  currentAthlete = athletes.find(a=>a.id===id) || null;
  activeView='ficha';
  render();
  await loadEvaluations(id);
  render();
};

/* ============================================================
   VISTA: LISTA DE DEPORTISTAS
   ============================================================ */
function viewLista(){
  let rows = athletes.length===0
    ? `<p class="hint">Todavía no cargaste deportistas.</p>`
    : athletes.map(a=>`
      <div class="athlete-row">
        <div>
          <div class="aname">${esc(a.nombre)}</div>
          <div class="ameta">
            <span class="tag">${esc(a.deporte||'—')}</span>
            <span class="tag">${esc(a.categoria||'—')}</span>
            ${a.edad? a.edad+' años · ':''}${esc(a.club||'')}
          </div>
        </div>
        <div class="btn-row" style="margin:0;">
          <button class="btn-primary" onclick="window.abrirFicha('${a.id}')">Abrir ficha</button>
          <button class="btn-danger" onclick="window.eliminarDeportista('${a.id}')">Eliminar</button>
        </div>
      </div>`).join('');
  return `<div class="panel">
    <div class="panel-head"><div><div class="eyebrow">Batería Psicodeportiva Integral</div><h1>Deportistas</h1></div></div>
    <div id="listaMsg"></div>
    ${rows}
    <div class="btn-row"><button class="btn-primary" onclick="window.gotoNuevo()">+ Nuevo deportista</button></div>
  </div>`;
}
window.eliminarDeportista = async function(id){
  if(!confirm('¿Eliminar este deportista y todas sus evaluaciones? Esta acción no se puede deshacer.')) return;
  const { error } = await supabase.from('athletes').delete().eq('id', id);
  if(error){ alert('Error al eliminar: '+error.message); return; }
  await loadAthletes(); render();
};

/* ============================================================
   VISTA: NUEVO DEPORTISTA
   ============================================================ */
function viewNuevoDeportista(){
  return `<div class="panel">
    <div class="panel-head"><div><div class="eyebrow">Nuevo registro</div><h1>Datos del deportista</h1></div></div>
    <div id="nuevoMsg"></div>
    <div class="grid2">
      <div><label>Nombre completo *</label><input type="text" id="nd_nombre"></div>
      <div><label>Edad</label><input type="number" id="nd_edad"></div>
      <div><label>Fecha de nacimiento</label><input type="date" id="nd_fechaNac"></div>
      <div><label>Sexo</label><select id="nd_sexo"><option value="">—</option><option>Masculino</option><option>Femenino</option><option>Otro</option></select></div>
      <div><label>Deporte</label><input type="text" id="nd_deporte" placeholder="Ej. Básquet, Fútbol, Atletismo"></div>
      <div><label>Modalidad</label><select id="nd_modalidad"><option value="">—</option><option value="individual">Individual</option><option value="colectivo">Colectivo</option></select></div>
      <div><label>Categoría / rama de edad</label><input type="text" id="nd_categoria" placeholder="Ej. Sub-17, Mayores"></div>
      <div><label>Posición / especialidad</label><input type="text" id="nd_posicion"></div>
      <div><label>Club / institución</label><input type="text" id="nd_club"></div>
      <div><label>Nivel competitivo</label>
        <select id="nd_nivel">
          <option value="">—</option>
          <option>Recreativo</option><option>Formativo</option><option>Amateur</option>
          <option>Semi-profesional</option><option>Profesional</option><option>Selección</option>
        </select>
      </div>
      <div><label>Años de experiencia</label><input type="number" id="nd_anios"></div>

window.guardarDeportista = async function(){
  const g = id => document.getElementById(id).value.trim();
  const nombre = g('nd_nombre');
  if(!nombre){ document.getElementById('nuevoMsg').innerHTML = `<div class="error-box">El nombre es obligatorio.</div>`; return; }
  const payload = {
    user_id: session.user.id,
    nombre,
    edad: g('nd_edad')? Number(g('nd_edad')): null,
    fecha_nacimiento: g('nd_fechaNac') || null,
    sexo: g('nd_sexo') || null,
    deporte: g('nd_deporte') || null,
    modalidad: g('nd_modalidad') || null,
    categoria: g('nd_categoria') || null,
    posicion: g('nd_posicion') || null,
    club: g('nd_club') || null,
    nivel_competitivo: g('nd_nivel') || null,
    anios_experiencia: g('nd_anios')? Number(g('nd_anios')): null,
    mano_dominante: g('nd_mano') || null,
    entrenador: g('nd_entrenador') || null,
    motivo_evaluacion: g('nd_motivo') || null,
    lesiones: g('nd_lesiones') || null,
  };
  const btn = event.target; btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Guardando…';
  const { error } = await supabase.from('athletes').insert(payload);
  if(error){
    document.getElementById('nuevoMsg').innerHTML = `<div class="error-box">Error al guardar: ${esc(error.message)}</div>`;
    btn.disabled = false; btn.textContent = 'Guardar deportista';
    return;
  }
  await loadAthletes();
  activeView = 'lista';
  render();
};

function viewFicha(){
  if(!currentAthlete) return `<div class="panel"><p>Cargando ficha…</p></div>`;
  const a = currentAthlete;
  const evalRows = evaluations.length===0
    ? `<p class="hint">Todavía no hay evaluaciones registradas para este deportista.</p>`
    : evaluations.map(e=>`
      <div class="eval-row">
        <div>${esc(e.fecha_evaluacion)} — ${esc(e.contexto||'Sin contexto')} <span class="badge-estado ${e.estado}">${e.estado==='completa'?'Completa':'En progreso'}</span></div>
        <div class="btn-row" style="margin:0;">
          <button class="btn-ghost" onclick="window.abrirEvaluacion('${e.id}')">Abrir</button>
          <button class="btn-danger" onclick="window.eliminarEvaluacion('${e.id}')">Eliminar</button>
        </div>
      </div>`).join('');
  return `
  <div class="panel">
    <div class="panel-head"><div><div class="eyebrow">Ficha del deportista</div><h1>${esc(a.nombre)}</h1></div>
      <button class="btn-ghost" onclick="window.gotoLista()">← Volver</button>
    </div>
    <div class="grid2">
      <div><strong>Deporte:</strong> ${esc(a.deporte||'—')}</div>
      <div><strong>Categoría:</strong> ${esc(a.categoria||'—')}</div>
      <div><strong>Modalidad:</strong> ${esc(a.modalidad||'—')}</div>
      <div><strong>Nivel:</strong> ${esc(a.nivel_competitivo||'—')}</div>
      <div><strong>Club:</strong> ${esc(a.club||'—')}</div>
      <div><strong>Entrenador:</strong> ${esc(a.entrenador||'—')}</div>
      <div><strong>Edad:</strong> ${a.edad||'—'}</div>
      <div><strong>Años de experiencia:</strong> ${a.anios_experiencia||'—'}</div>
    </div>
    ${a.motivo_evaluacion? `<p><strong>Motivo de evaluación:</strong> ${esc(a.motivo_evaluacion)}</p>`:''}
    ${a.lesiones? `<p><strong>Lesiones relevantes:</strong> ${esc(a.lesiones)}</p>`:''}
    <div class="btn-row">
      <button class="btn-primary" onclick="window.abrirTecnicas()">🧠 Plan de entrenamiento mental</button>
      <button class="btn-primary" onclick="window.abrirMonitoreo()">📋 Monitoreo diario</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head"><div><div class="eyebrow">Historial</div><h1>Evaluaciones</h1></div></div>
    <div id="evalMsg"></div>
    ${evalRows}
    <div class="grid2" style="margin-top:16px;">
      <div><label>Fecha</label><input type="date" id="ne_fecha" value="${new Date().toISOString().slice(0,10)}"></div>
      <div><label>Evaluador</label><input type="text" id="ne_evaluador"></div>
      <div style="grid-column:1/3;"><label>Contexto</label>
        <select id="ne_contexto">
          <option value="">—</option>
          <option>Pre-temporada</option><option>Mitad de temporada</option><option>Post-temporada</option>
          <option>Retorno post-lesión</option><option>Proceso de selección</option><option>Seguimiento</option>
        </select>
      </div>
    </div>
    <div class="btn-row"><button class="btn-primary" onclick="window.crearEvaluacion()">+ Nueva evaluación</button></div>
  </div>`;
}
window.crearEvaluacion = async function(){
  const fecha = document.getElementById('ne_fecha').value;
  const evaluador = document.getElementById('ne_evaluador').value.trim();
  const contexto = document.getElementById('ne_contexto').value;
  const payload = { athlete_id: currentAthleteId, user_id: session.user.id, fecha_evaluacion: fecha, evaluador, contexto };
  const { error } = await supabase.from('evaluations').insert(payload);
  if(error){ document.getElementById('evalMsg').innerHTML = `<div class="error-box">Error: ${esc(error.message)}</div>`; return; }
  await loadEvaluations(currentAthleteId);
  render();
};
window.eliminarEvaluacion = async function(id){
  if(!confirm('¿Eliminar esta evaluación?')) return;
  const { error } = await supabase.from('evaluations').delete().eq('id', id);
  if(error){ alert('Error: '+error.message); return; }
  await loadEvaluations(currentAthleteId);
  render();
};

function scoreCSAI2(answers){
  const bySub = {cognitiva:[], somatica:[], confianza:[]};
  CSAI2_ITEMS.forEach((it,i)=> bySub[it.sub].push(answers[i]));
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  return { cognitiva: avg(bySub.cognitiva), somatica: avg(bySub.somatica), confianza: avg(bySub.confianza) };
}
function scoreSAS2(answers){
  const bySub = {somatica:[], preocupacion:[], concentracion:[]};
  SAS2_ITEMS.forEach((it,i)=> bySub[it.sub].push(answers[i]));
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  return { somatica: avg(bySub.somatica), preocupacion: avg(bySub.preocupacion), concentracion: avg(bySub.concentracion) };
}
function scorePSS14(answers){
  let total = 0;
  PSS14_ITEMS.forEach((it,i)=>{ total += it.rev ? (4-answers[i]) : answers[i]; });
  return { total };
}
function scoreABQ(answers){
  const bySub = {agotamiento:[], realizacion:[], devaluacion:[]};
  ABQ_ITEMS.forEach((it,i)=> bySub[it.sub].push(answers[i]));
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const subs = { agotamiento: avg(bySub.agotamiento), realizacion: avg(bySub.realizacion), devaluacion: avg(bySub.devaluacion) };
  subs.global = (subs.agotamiento + subs.realizacion + subs.devaluacion) / 3;
  return subs;
}
function scoreSMS28(answers){
  const bySub = {im_conocer:[], im_logro:[], im_estimulo:[], em_identificada:[], em_introyectada:[], em_externa:[], amotivacion:[]};
  SMS28_ITEMS.forEach((it,i)=> bySub[it.sub].push(answers[i]));
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const s = {
    im_conocer: avg(bySub.im_conocer), im_logro: avg(bySub.im_logro), im_estimulo: avg(bySub.im_estimulo),
    em_identificada: avg(bySub.em_identificada), em_introyectada: avg(bySub.em_introyectada), em_externa: avg(bySub.em_externa),
    amotivacion: avg(bySub.amotivacion),
  };
  const imGlobal = (s.im_conocer + s.im_logro + s.im_estimulo) / 3;
  // Índice de Autodeterminación (Vallerand): +2·IM +1·EM_identificada -1·EM_introyectada -2·EM_externa -2·Amotivación
  s.imGlobal = imGlobal;
  s.indiceAutodeterminacion = (2*imGlobal) + (1*s.em_identificada) - (1*s.em_introyectada) - (2*s.em_externa) - (2*s.amotivacion);
  return s;
}
function scoreTEOSQ(answers){
  const bySub = {tarea:[], ego:[]};
  TEOSQ_ITEMS.forEach((it,i)=> bySub[it.sub].push(answers[i]));
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  return { tarea: avg(bySub.tarea), ego: avg(bySub.ego) };
}
function scoreAutoeficacia(answers){
  const bySub = {previa:[], presion:[], error:[], cierre:[]};
  AUTOEFI_ITEMS.forEach((it,i)=> bySub[it.sub].push(answers[i]));
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const s = { previa: avg(bySub.previa), presion: avg(bySub.presion), error: avg(bySub.error), cierre: avg(bySub.cierre) };
  s.global = (s.previa + s.presion + s.error + s.cierre) / 4;
  return s;
}
function scoreMood(answers){
  const bySub = {tension:[], vigor:[], fatiga:[], irritabilidad:[], confusion:[], animo:[]};
  MOOD_ITEMS.forEach((it,i)=> bySub[it.sub].push(answers[i]));
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const s = {
    tension: avg(bySub.tension), vigor: avg(bySub.vigor), fatiga: avg(bySub.fatiga),
    irritabilidad: avg(bySub.irritabilidad), confusion: avg(bySub.confusion), animo: avg(bySub.animo),
  };
  // Perturbación anímica total, inspirado en el TMD del POMS: negativas - positivas
  s.perturbacionTotal = (s.tension + s.fatiga + s.irritabilidad + s.confusion) - (s.vigor + s.animo);
  return s;
}
function scoreFSS2(answers){
  const bySub = {equilibrio:[], fusion:[], objetivos:[], feedback:[], concentracion:[], control:[], autoconciencia:[], tiempo:[], autotelica:[]};
  FSS2_ITEMS.forEach((it,i)=> bySub[it.sub].push(answers[i]));
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const s = {};
  Object.keys(bySub).forEach(k=> s[k]=avg(bySub[k]));
  s.global = Object.keys(bySub).reduce((acc,k)=>acc+s[k],0) / Object.keys(bySub).length;
  return s;
}
function scoreGEQ(answers){
  const bySub = {atg_tarea:[], atg_social:[], gi_tarea:[], gi_social:[]};
  GEQ_ITEMS.forEach((it,i)=> bySub[it.sub].push(answers[i]));
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const s = { atg_tarea: avg(bySub.atg_tarea), atg_social: avg(bySub.atg_social), gi_tarea: avg(bySub.gi_tarea), gi_social: avg(bySub.gi_social) };
  s.global = (s.atg_tarea + s.atg_social + s.gi_tarea + s.gi_social) / 4;
  return s;
}

window.guardarInstrumento = async function(key){
  const inst = INSTRUMENTS[key];
  const answers = inst.items.map((it,i)=>{
    const r = document.querySelector(`input[name="q_${i}"]:checked`);
    return r? Number(r.value): null;
  });
  if(answers.includes(null)){
    document.getElementById('instMsg').innerHTML = `<div class="error-box">Respondé todos los ítems antes de guardar.</div>`;
    return;
  }
  let scores;
  if(key==='csai2') scores = scoreCSAI2(answers);
  else if(key==='sas2') scores = scoreSAS2(answers);
  else if(key==='pss14') scores = scorePSS14(answers);
  else if(key==='abq') scores = scoreABQ(answers);
  else if(key==='sms28') scores = scoreSMS28(answers);
  else if(key==='teosq') scores = scoreTEOSQ(answers);
  else if(key==='autoeficacia') scores = scoreAutoeficacia(answers);
  else if(key==='mood') scores = scoreMood(answers);
  else if(key==='fss2') scores = scoreFSS2(answers);
  else if(key==='geq') scores = scoreGEQ(answers);

  const payload = {
    evaluation_id: currentEvaluationId,
    user_id: session.user.id,
    module_key: key,
    raw_data: answers,
    scores: scores,
    completed: true,
    updated_at: new Date().toISOString(),
  };
  const { error } = await supabase.from('module_results').upsert(payload, { onConflict: 'evaluation_id,module_key' });
  if(error){
    document.getElementById('instMsg').innerHTML = `<div class="error-box">Error al guardar: ${esc(error.message)}</div>`;
    return;
  }
  await loadModuleResults(currentEvaluationId);
  document.getElementById('instResults').innerHTML = renderInstrumentoResultado(key, scores);
  document.getElementById('instMsg').innerHTML = `<div class="ok-box">Guardado correctamente.</div>`;
};

function levelAvg4(avg){ if(avg>=3) return 'rojo'; if(avg>=2) return 'amarillo'; return 'verde'; }
function levelConfianza(avg){ if(avg>=3) return 'verde'; if(avg>=2) return 'amarillo'; return 'rojo'; }
function levelPSS(total){ if(total>=27) return 'rojo'; if(total>=14) return 'amarillo'; return 'verde'; }
function levelABQ(avg){ if(avg>=3.5) return 'rojo'; if(avg>=2.5) return 'amarillo'; return 'verde'; }

function renderInstrumentoResultado(key, s){
  if(['mood','fss2','geq'].includes(key)) return renderInstrumentoResultadoExtra(key, s);
  if(key==='csai2'){
    return `<div class="score-grid">
      ${scoreCardHtml('Ansiedad cognitiva', s.cognitiva.toFixed(2)+' / 4', levelAvg4(s.cognitiva))}
      ${scoreCardHtml('Ansiedad somática', s.somatica.toFixed(2)+' / 4', levelAvg4(s.somatica))}
      ${scoreCardHtml('Autoconfianza', s.confianza.toFixed(2)+' / 4', levelConfianza(s.confianza))}
    </div><p class="hint">Promedio por ítem (1-4). En autoconfianza, alto = mejor (verde).</p>`;
  }
  if(key==='sas2'){
    return `<div class="score-grid">
      ${scoreCardHtml('Ansiedad somática', s.somatica.toFixed(2)+' / 4', levelAvg4(s.somatica))}
      ${scoreCardHtml('Preocupación (worry)', s.preocupacion.toFixed(2)+' / 4', levelAvg4(s.preocupacion))}
      ${scoreCardHtml('Disrupción de concentración', s.concentracion.toFixed(2)+' / 4', levelAvg4(s.concentracion))}
    </div><p class="hint">Promedio por ítem (1-4).</p>`;
  }
  if(key==='pss14'){
    return `<div class="score-grid">${scoreCardHtml('Estrés percibido total', s.total+' / 56', levelPSS(s.total))}</div>
    <p class="hint">0-13 bajo · 14-26 moderado · 27-56 alto (banda orientativa de uso frecuente en la literatura, no un punto de corte diagnóstico oficial).</p>`;
  }
  if(key==='abq'){
    return `<div class="score-grid">
      ${scoreCardHtml('Agotamiento', s.agotamiento.toFixed(2)+' / 5', levelABQ(s.agotamiento))}
      ${scoreCardHtml('Reducida realización', s.realizacion.toFixed(2)+' / 5', levelABQ(s.realizacion))}
      ${scoreCardHtml('Devaluación del deporte', s.devaluacion.toFixed(2)+' / 5', levelABQ(s.devaluacion))}
      ${scoreCardHtml('Burnout global', s.global.toFixed(2)+' / 5', levelABQ(s.global))}
    </div><p class="hint">Promedio por ítem (1-5). ≥3.5 alto · 2.5-3.49 moderado · &lt;2.5 bajo.</p>`;
  }
  if(key==='sms28'){
    const neutro = v => `<div class="score-card"><div class="sc-label">${v.l}</div><div class="sc-value">${v.v.toFixed(2)} / 7</div></div>`;
    return `<div class="score-grid">
      ${neutro({l:'Intrínseca · Conocer', v:s.im_conocer})}
      ${neutro({l:'Intrínseca · Logro', v:s.im_logro})}
      ${neutro({l:'Intrínseca · Estimulación', v:s.im_estimulo})}
      ${neutro({l:'Extrínseca · Identificada', v:s.em_identificada})}
      ${neutro({l:'Extrínseca · Introyectada', v:s.em_introyectada})}
      ${neutro({l:'Extrínseca · Externa', v:s.em_externa})}
      ${scoreCardHtml('Amotivación', s.amotivacion.toFixed(2)+' / 7', s.amotivacion>=4?'rojo':(s.amotivacion>=2.5?'amarillo':'verde'))}
      ${scoreCardHtml('Índice de autodeterminación', s.indiceAutodeterminacion.toFixed(2), s.indiceAutodeterminacion>=5?'verde':(s.indiceAutodeterminacion>=0?'amarillo':'rojo'))}
    </div><p class="hint">Las 6 primeras subescalas son un perfil descriptivo (no hay "bueno/malo" per se). El índice de autodeterminación resume el conjunto: valores altos = motivación más autónoma/saludable; valores negativos = motivación predominantemente controlada o ausente.</p>`;
  }
  if(key==='teosq'){
    const dominante = s.tarea>s.ego? 'orientación a la TAREA (compite contra su propia mejora)': s.ego>s.tarea? 'orientación al EGO (compite por el resultado y la comparación social)':'un perfil mixto, sin orientación claramente dominante';
    return `<div class="score-grid">
      ${scoreCardHtml('Orientación a la tarea', s.tarea.toFixed(2)+' / 5', 'verde')}
      ${scoreCardHtml('Orientación al ego', s.ego.toFixed(2)+' / 5', 'amarillo')}
    </div><p class="hint">Perfil dominante: ${dominante}. Ninguna de las dos orientaciones es "mala" en sí misma; el riesgo aparece cuando el ego es alto y la tarea es baja (rendimiento dependiente exclusivamente del resultado).</p>`;
  }
  if(key==='autoeficacia'){
    return `<div class="score-grid">
      ${scoreCardHtml('Antes de competir', s.previa.toFixed(2)+' / 5', levelAutoefi(s.previa))}
      ${scoreCardHtml('Bajo presión', s.presion.toFixed(2)+' / 5', levelAutoefi(s.presion))}
      ${scoreCardHtml('Después de un error', s.error.toFixed(2)+' / 5', levelAutoefi(s.error))}
      ${scoreCardHtml('Cierre de competencia', s.cierre.toFixed(2)+' / 5', levelAutoefi(s.cierre))}
      ${scoreCardHtml('Autoeficacia global', s.global.toFixed(2)+' / 5', levelAutoefi(s.global))}
    </div><p class="hint">≥4 alta · 2.5-3.99 moderada · &lt;2.5 baja.</p>`;
  }
}
function levelAutoefi(avg){ if(avg>=4) return 'verde'; if(avg>=2.5) return 'amarillo'; return 'rojo'; }
function levelMoodNeg(avg){ if(avg>=3) return 'rojo'; if(avg>=1.5) return 'amarillo'; return 'verde'; }
function levelMoodPos(avg){ if(avg>=3) return 'verde'; if(avg>=1.5) return 'amarillo'; return 'rojo'; }
function levelFlow(avg){ if(avg>=4) return 'verde'; if(avg>=3) return 'amarillo'; return 'rojo'; }
function levelGEQ(avg){ if(avg>=7) return 'verde'; if(avg>=4) return 'amarillo'; return 'rojo'; }

function buildInterpretacionAnsiedadEstres(){
  const csai = moduleResults.csai2.scores;
  const sas = moduleResults.sas2.scores;
  const pss = moduleResults.pss14.scores;
  const abq = moduleResults.abq.scores;
  const lines = [];

  if(csai.cognitiva>=3) lines.push('El CSAI-2R muestra ansiedad cognitiva elevada de cara a la competencia (preocupación excesiva por el resultado y el juicio de terceros).');
  if(csai.somatica>=3) lines.push('El CSAI-2R muestra activación somática elevada (tensión física, síntomas neurovegetativos) previa a competir.');
  if(csai.confianza<2) lines.push('El CSAI-2R muestra baja autoconfianza competitiva, lo cual suele potenciar el efecto negativo de la ansiedad sobre el rendimiento.');

  if(sas.preocupacion>=3 && csai.cognitiva>=3) lines.push('El SAS-2 confirma el patrón de preocupación (worry) detectado en el CSAI-2R, lo que sugiere un componente cognitivo de ansiedad consistente entre instrumentos.');
  if(sas.concentracion>=3) lines.push('El SAS-2 señala disrupción relevante de la concentración durante la competencia, un dato clave para trabajar rutinas atencionales.');

  if(pss.total>=27) lines.push('El PSS-14 indica un nivel de estrés percibido general alto, lo que sugiere que la ansiedad competitiva podría estar amplificada por estrés de fondo no directamente ligado al deporte (académico, familiar, económico).');
  else if(pss.total>=14) lines.push('El PSS-14 indica un nivel de estrés percibido general moderado.');

  if(abq.global>=3.5) lines.push('El ABQ indica un cuadro de burnout deportivo relevante (agotamiento, desmotivación y/o devaluación del deporte), lo que amerita una intervención prioritaria y posible ajuste de carga de entrenamiento en conjunto con el cuerpo técnico.');
  else if(abq.global>=2.5) lines.push('El ABQ indica señales moderadas de desgaste deportivo, a monitorear en próximas evaluaciones.');
  if(abq.agotamiento>=3.5 && pss.total>=27) lines.push('El agotamiento reportado en el ABQ es consistente con el alto estrés percibido general (PSS-14), lo que reduce la probabilidad de que se trate solo de fatiga física y sugiere un componente de sobrecarga psicológica.');

  let sintesis;
  const riesgos = [csai.cognitiva>=3||csai.somatica>=3, sas.preocupacion>=3||sas.concentracion>=3, pss.total>=27, abq.global>=3.5].filter(Boolean).length;
  if(riesgos===0){
    sintesis = 'El perfil integrado no muestra, por ahora, indicadores clínicamente relevantes de ansiedad competitiva, estrés general o burnout. Se recomienda continuar con seguimiento periódico durante la temporada.';
  } else if(riesgos<=2){
    sintesis = 'El perfil integrado muestra algunos indicadores a monitorear. Se sugiere trabajar estrategias de regulación (respiración, activación óptima, rutinas pre-competitivas) y reevaluar en la siguiente ventana de seguimiento.';
  } else {
    sintesis = 'El perfil integrado muestra múltiples indicadores concurrentes de ansiedad, estrés y/o desgaste deportivo. Se recomienda una intervención psicológica activa y coordinación con el cuerpo técnico sobre carga de entrenamiento y competencia, con reevaluación en un plazo breve (2-4 semanas).';
  }

  return lines.map(l=>`<p>${l}</p>`).join('') + `<p><strong>${sintesis}</strong></p>`;
}

function buildInterpretacionMotivacion(){
  const sms = moduleResults.sms28.scores;
  const teosq = moduleResults.teosq.scores;
  const autoefi = moduleResults.autoeficacia.scores;
  const lines = [];

  if(sms.amotivacion>=4) lines.push('El SMS-28 muestra amotivación elevada: el/la deportista está cuestionando activamente si vale la pena continuar en su deporte.');
  if(sms.indiceAutodeterminacion<0) lines.push('El índice de autodeterminación es negativo, lo que indica que la motivación actual está predominantemente sostenida por presión externa o interna (obligación, aprobación de otros) más que por interés genuino.');
  else if(sms.indiceAutodeterminacion>=5) lines.push('El índice de autodeterminación es alto, lo que sugiere una motivación mayormente autónoma y protectora frente al desgaste.');

  if(teosq.ego>teosq.tarea+0.5) lines.push('El TEOSQ muestra una orientación al ego claramente predominante sobre la orientación a la tarea, lo que puede asociarse a mayor vulnerabilidad emocional ante derrotas o comparaciones desfavorables.');
  else if(teosq.tarea>teosq.ego+0.5) lines.push('El TEOSQ muestra una orientación a la tarea predominante, un perfil generalmente protector frente a la presión por el resultado.');

  if(autoefi.global<2.5) lines.push('La autoeficacia deportiva situacional es baja en general, lo que puede limitar el rendimiento independientemente de la capacidad técnica real.');
  if(autoefi.presion<2.5) lines.push('Particularmente, la autoeficacia bajo presión es baja — un blanco claro para trabajo de preparación mental en momentos de marcador ajustado o alta exigencia.');
  if(autoefi.error<2.5) lines.push('La autoeficacia tras cometer un error es baja, lo que sugiere dificultad para recuperarse rápidamente de fallos durante la competencia (rumiación post-error).');

  // Cruce con Ansiedad + Estrés si ya están disponibles
  if(moduleResults.abq && moduleResults.abq.completed){
    const abq = moduleResults.abq.scores;
    if(sms.amotivacion>=4 && abq.global>=3.5) lines.push('La amotivación detectada en el SMS-28 es consistente con el burnout ya identificado en el ABQ — ambos instrumentos convergen en un cuadro de desgaste motivacional relevante.');
  }
  if(moduleResults.csai2 && moduleResults.csai2.completed){
    const csai = moduleResults.csai2.scores;
    if(teosq.ego>teosq.tarea+0.5 && csai.cognitiva>=3) lines.push('La orientación al ego predominante es consistente con la ansiedad cognitiva elevada del CSAI-2R: competir principalmente por el resultado y la comparación social puede estar alimentando la preocupación por el juicio de terceros.');
    if(autoefi.global<2.5 && csai.confianza<2) lines.push('La baja autoeficacia situacional coincide con la baja autoconfianza reportada en el CSAI-2R, reforzando la necesidad de trabajar la confianza como eje central de la intervención.');
  }

  let sintesis;
  const riesgos = [sms.amotivacion>=4, sms.indiceAutodeterminacion<0, teosq.ego>teosq.tarea+0.5, autoefi.global<2.5].filter(Boolean).length;
  if(riesgos===0){
    sintesis = 'El perfil motivacional es favorable: motivación mayormente autónoma, orientación equilibrada o hacia la tarea, y autoeficacia adecuada. Se recomienda mantener las estrategias actuales de motivación y reforzar el enfoque en el proceso más que en el resultado.';
  } else if(riesgos<=2){
    sintesis = 'El perfil motivacional muestra algunos puntos a trabajar. Se sugiere reforzar la orientación a la tarea (metas de proceso y mejora personal) y trabajar autoeficacia específica en los momentos más débiles identificados.';
  } else {
    sintesis = 'El perfil motivacional muestra múltiples indicadores de riesgo (amotivación, motivación controlada, orientación al ego dominante y/o baja autoeficacia). Se recomienda una intervención motivacional activa, en coordinación con el entrenador, revisando también la carga competitiva y el estilo de retroalimentación que recibe el/la deportista.';
  }

  return lines.map(l=>`<p>${l}</p>`).join('') + `<p><strong>${sintesis}</strong></p>`;
}

function buildInterpretacionEstado(){
  const mood = moduleResults.mood.scores;
  const fss = moduleResults.fss2.scores;
  const geq = moduleResults.geq ? moduleResults.geq.scores : null;
  const lines = [];

  if(mood.perturbacionTotal>=4) lines.push('El estado de ánimo muestra una perturbación anímica elevada (predominio de tensión, fatiga, irritabilidad y/o confusión sobre el vigor y el ánimo positivo).');
  if(mood.fatiga>=3) lines.push('La fatiga reportada es alta, lo cual es relevante para decisiones de carga de entrenamiento y recuperación.');
  if(mood.vigor<1.5) lines.push('El vigor es bajo, lo que puede reflejar sobrecarga física, falta de descanso, o desgaste motivacional.');

  if(fss.global<3) lines.push('El estado de flow global es bajo: el/la deportista no está experimentando con frecuencia ese estado de absorción óptima durante la competencia o el entrenamiento.');
  if(fss.control<3 && fss.autoconciencia<3) lines.push('La baja sensación de control junto con alta autoconciencia (preocupación por cómo lo/la ven) sugiere que la atención se está dirigiendo hacia el juicio externo en vez de hacia la tarea.');
  if(fss.equilibrio<3) lines.push('El equilibrio reto-habilidad es bajo, lo que puede indicar que la exigencia percibida no está ajustada a su nivel actual de habilidad (demasiado difícil o demasiado fácil).');

  if(geq){
    if(geq.global<4) lines.push('La cohesión de equipo percibida es baja, tanto a nivel de tarea como social, lo cual puede estar afectando el compromiso y el rendimiento colectivo.');
    else if(geq.global>=7) lines.push('La cohesión de equipo percibida es alta, un factor protector relevante para el bienestar y el rendimiento colectivo.');
  }

  // Cruce con tandas anteriores
  if(moduleResults.abq && moduleResults.abq.completed){
    const abq = moduleResults.abq.scores;
    if(mood.fatiga>=3 && abq.agotamiento>=3.5) lines.push('La fatiga del estado de ánimo es consistente con el agotamiento ya detectado en el ABQ, reforzando la necesidad de revisar la carga de entrenamiento y competencia.');
  }
  if(moduleResults.csai2 && moduleResults.csai2.completed){
    const csai = moduleResults.csai2.scores;
    if(fss.global<3 && csai.cognitiva>=3) lines.push('El bajo flow es consistente con la ansiedad cognitiva elevada del CSAI-2R: la preocupación excesiva suele desplazar la atención de la tarea y dificultar el ingreso al estado de flujo.');
  }
  if(geq && moduleResults.sms28 && moduleResults.sms28.completed){
    const sms = moduleResults.sms28.scores;
    if(geq.global<4 && sms.amotivacion>=4) lines.push('La baja cohesión de equipo podría estar contribuyendo a la amotivación detectada en el SMS-28 — vale la pena explorar el clima grupal como factor asociado.');
  }

  let sintesis;
  const riesgos = [mood.perturbacionTotal>=4, fss.global<3, geq && geq.global<4].filter(Boolean).length;
  if(riesgos===0){
    sintesis = 'El perfil de estado de ánimo, flow y (si corresponde) cohesión grupal es favorable. Se recomienda mantener las rutinas actuales y continuar el seguimiento periódico.';
  } else if(riesgos===1){
    sintesis = 'Hay un punto a monitorear en este bloque. Se sugiere reevaluar en la siguiente ventana de seguimiento y trabajar específicamente el área señalada.';
  } else {
    sintesis = 'Hay múltiples indicadores concurrentes en este bloque (ánimo, flow y/o cohesión). Se recomienda priorizar este frente en la intervención psicológica y coordinar con el cuerpo técnico ajustes de carga, clima de equipo o ambos.';
  }

  return lines.map(l=>`<p>${l}</p>`).join('') + `<p><strong>${sintesis}</strong></p>`;
}

function randBetween(a,b){ return a + Math.random()*(b-a); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

async function guardarResultadoCognitivo(key, dificultad, raw, scores){
  const payload = {

  };

  await loadModuleResults(currentEvaluationId);
  render();
}

const REACTION_SIMPLE_PARAMS = {
  principiante: {trials:8, minDelay:2000, maxDelay:4000},
  intermedio: {trials:12, minDelay:1500, maxDelay:3500},
  avanzado: {trials:16, minDelay:800, maxDelay:2500},
};
function viewReactionSimple(){
  if(cog && cog.task==='reaction_simple'){
    return `<div class="panel">
      <div class="panel-head"><div><div class="eyebrow">Tiempo de reacción simple · ${cog.dificultad}</div><h1>Ensayo ${Math.min(cog.currentTrial+1,cog.total)} de ${cog.total}</h1></div></div>
      <div id="reactionStage"></div>
    </div>`;
  }
  const result = moduleResults.reaction_simple;
  return `<div class="panel">
    <div class="panel-head"><div><div class="eyebrow">Evaluación cognitiva</div><h1>Tiempo de reacción simple</h1></div>
      <button class="btn-ghost" onclick="window.volverDeTareaCognitiva()">← Volver</button></div>
    <p class="hint">Hacé clic apenas la pantalla se ponga verde. Si hacés clic antes, se cuenta como anticipación.</p>
    ${result && result.completed ? renderReactionSimpleResults(result.scores) : ''}
    ${renderDifficultySelector('reaction_simple')}
  </div>`;
}
window.volverDeTareaCognitiva = volverDeTareaCognitiva;
window.iniciarReactionSimple = function(dificultad){
  const p = REACTION_SIMPLE_PARAMS[dificultad];
  cog = { task:'reaction_simple', dificultad, total:p.trials, currentTrial:0, trials:[], falseStarts:0, params:p, phase:'pendiente' };
  activeView='reaction_simple'; render();
  setTimeout(nextReactionSimpleTrial, 400);
};
function nextReactionSimpleTrial(){
  if(!cog || cog.task!=='reaction_simple') return;
  if(cog.currentTrial>=cog.total){ return finishReactionSimple(); }
  cog.phase='esperando';
  renderReactionStage();
  const delay = randBetween(cog.params.minDelay, cog.params.maxDelay);
  cog.timeoutId = setTimeout(()=>{
    if(!cog || cog.task!=='reaction_simple') return;
    cog.phase='activo';
    cog.stimulusTime = Date.now();
    renderReactionStage();
  }, delay);
}
function renderReactionStage(){
  const el = document.getElementById('reactionStage');
  if(!el) return;
  if(cog.phase==='esperando'){
    el.innerHTML = `<div onclick="window.reactionSimpleClick()" style="height:220px;border-radius:10px;background:var(--rojo);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;cursor:pointer;">Esperá... no hagas clic todavía</div>`;
  } else if(cog.phase==='activo'){
    el.innerHTML = `<div onclick="window.reactionSimpleClick()" style="height:220px;border-radius:10px;background:var(--verde);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;cursor:pointer;">¡CLIC AHORA!</div>`;
  } else if(cog.phase==='feedback'){
    const lastRt = cog.trials[cog.trials.length-1];
    el.innerHTML = `<div style="height:220px;border-radius:10px;background:#F1F6F9;display:flex;align-items:center;justify-content:center;color:var(--primary-dark);font-size:18px;">${lastRt} ms</div>`;
  }
}
window.reactionSimpleClick = function(){
  if(!cog || cog.task!=='reaction_simple') return;
  if(cog.phase==='esperando'){
    clearTimeout(cog.timeoutId);
    cog.falseStarts++;
    const el = document.getElementById('reactionStage');
    if(el) el.innerHTML = `<div style="height:220px;border-radius:10px;background:var(--amarillo-bg);display:flex;align-items:center;justify-content:center;color:var(--amarillo);font-size:16px;">Anticipación — esperá al verde</div>`;
    setTimeout(nextReactionSimpleTrial, 900);
    return;
  }
  if(cog.phase==='activo'){
    const rt = Date.now() - cog.stimulusTime;
    cog.trials.push(rt);
    cog.currentTrial++;
    cog.phase='feedback';
    renderReactionStage();
    setTimeout(nextReactionSimpleTrial, 700);
  }
};
function finishReactionSimple(){
  const trials = cog.trials;
  const dificultad = cog.dificultad;
  if(trials.length===0){ cog=null; render(); return; }
  const mean = trials.reduce((a,b)=>a+b,0)/trials.length;
  const variance = trials.reduce((a,b)=>a+(b-mean)*(b-mean),0)/trials.length;
  const sd = Math.sqrt(variance);
  const scores = { mean: Math.round(mean), sd: Math.round(sd), min: Math.min(...trials), max: Math.max(...trials), falseStarts: cog.falseStarts, total: trials.length };
  guardarResultadoCognitivo('reaction_simple', dificultad, trials, scores);
}
function renderReactionSimpleResults(s){
  const level = s.mean<=250 && s.falseStarts<=1 ? 'verde' : s.mean<=350 ? 'amarillo':'rojo';
  return `<div class="score-grid">
    ${scoreCardHtml('Tiempo medio', s.mean+' ms', level)}
    ${scoreCardHtml('Variabilidad (SD)', s.sd+' ms', s.sd<=60?'verde':(s.sd<=100?'amarillo':'rojo'))}
    ${scoreCardHtml('Más rápido', s.min+' ms', 'verde')}
    ${scoreCardHtml('Más lento', s.max+' ms', 'amarillo')}
    ${scoreCardHtml('Anticipaciones', s.falseStarts, s.falseStarts<=1?'verde':(s.falseStarts<=3?'amarillo':'rojo'))}
  </div><p class="hint">Una SD alta indica inconsistencia en la respuesta (a veces rápido, a veces lento), lo cual puede ser tan relevante como el promedio.</p>`;
}

      <button class="btn-ghost" onclick="window.volverDeTareaCognitiva()">← Volver</button></div>
    <p class="hint">Círculo verde: hacé clic. Cuadrado rojo: NO hagas clic.</p>
    ${result && result.completed ? renderReactionChoiceResults(result.scores) : ''}
    ${renderDifficultySelector('reaction_choice')}
  </div>`;
}
window.iniciarReactionChoice = function(dificultad){
  const p = REACTION_CHOICE_PARAMS[dificultad];
  cog = {task:'reaction_choice', dificultad, total:p.trials, currentTrial:0, results:[], params:p, phase:'iti'};
  activeView='reaction_choice'; render();
  setTimeout(nextReactionChoiceTrial, 400);
};
function nextReactionChoiceTrial(){
  if(!cog || cog.task!=='reaction_choice') return;
  if(cog.currentTrial>=cog.total) return finishReactionChoice();
  cog.phase='iti';
  renderChoiceStage();
  const isi = randBetween(cog.params.isiMin, cog.params.isiMax);
  setTimeout(()=>{
    if(!cog || cog.task!=='reaction_choice') return;
    cog.stimType = Math.random()<cog.params.noGoRatio ? 'nogo':'go';
    cog.responded = false;
    cog.stimulusTime = Date.now();
    cog.phase='stim';
    renderChoiceStage();
    cog.timeoutId = setTimeout(()=>{
      if(!cog || cog.task!=='reaction_choice') return;
      if(!cog.responded){
        cog.results.push({type:cog.stimType, responded:false, rt:null});
        cog.currentTrial++;
        nextReactionChoiceTrial();
      }
    }, cog.params.stimDuration);
  }, isi);
}
function renderChoiceStage(){
  const el = document.getElementById('choiceStage');
  if(!el) return;
  if(cog.phase==='iti'){
    el.innerHTML = `<div style="height:220px;border-radius:10px;background:#F1F6F9;"></div>`;
  } else if(cog.phase==='stim'){
    const color = cog.stimType==='go' ? 'var(--verde)':'var(--rojo)';
    const radius = cog.stimType==='go' ? '50%':'8px';
    el.innerHTML = `<div onclick="window.reactionChoiceClick()" style="height:220px;display:flex;align-items:center;justify-content:center;cursor:pointer;">
      <div style="width:130px;height:130px;border-radius:${radius};background:${color};"></div>
    </div>`;
  }
}
window.reactionChoiceClick = function(){
  if(!cog || cog.task!=='reaction_choice' || cog.phase!=='stim' || cog.responded) return;
  cog.responded = true;
  clearTimeout(cog.timeoutId);
  const rt = Date.now()-cog.stimulusTime;
  cog.results.push({type:cog.stimType, responded:true, rt});
  cog.currentTrial++;
  nextReactionChoiceTrial();
};
function finishReactionChoice(){
  const results = cog.results;
  const dificultad = cog.dificultad;
  const goTrials = results.filter(r=>r.type==='go');
  const noGoTrials = results.filter(r=>r.type==='nogo');
  const hits = goTrials.filter(r=>r.responded);
  const misses = goTrials.filter(r=>!r.responded);
  const commissions = noGoTrials.filter(r=>r.responded);
  const correctInhibitions = noGoTrials.filter(r=>!r.responded);
  const meanRt = hits.length? Math.round(hits.reduce((a,b)=>a+b.rt,0)/hits.length) : null;
  const scores = {
    goTotal: goTrials.length, hits: hits.length, misses: misses.length, meanRt,
    noGoTotal: noGoTrials.length, commissions: commissions.length, correctInhibitions: correctInhibitions.length,
  };
  guardarResultadoCognitivo('reaction_choice', dificultad, results, scores);
}
function renderReactionChoiceResults(s){
  const commissionRate = s.noGoTotal? s.commissions/s.noGoTotal : 0;
  return `<div class="score-grid">
    ${scoreCardHtml('Aciertos (Go)', s.hits+' / '+s.goTotal, s.goTotal && (s.hits/s.goTotal)>=0.9?'verde':'amarillo')}
    ${scoreCardHtml('Tiempo medio (Go)', (s.meanRt||'—')+' ms', 'verde')}
    ${scoreCardHtml('Errores de comisión (No-Go)', s.commissions+' / '+s.noGoTotal, commissionRate<=0.15?'verde':(commissionRate<=0.3?'amarillo':'rojo'))}
    ${scoreCardHtml('Inhibiciones correctas', s.correctInhibitions+' / '+s.noGoTotal, 'verde')}
  </div><p class="hint">Los errores de comisión (responder cuando no debía) son el indicador clave de impulsividad/control inhibitorio.</p>`;
}

/* ---------- 3) Atención sostenida (CPT deportivo) ---------- */
const CPT_PARAMS = {
  principiante: {durationSec:75, isi:1300, targetRatio:0.2},
  intermedio: {durationSec:120, isi:1000, targetRatio:0.18},
  avanzado: {durationSec:165, isi:800, targetRatio:0.15},
};
function viewAtencionSostenida(){
  if(cog && cog.task==='atencion_sostenida'){
    return `<div class="panel">
      <div class="panel-head"><div><div class="eyebrow">Atención sostenida · ${cog.dificultad}</div><h1>En curso</h1></div></div>
      <div id="cptStage"></div>
    </div>`;
  }
  const result = moduleResults.atencion_sostenida;
  return `<div class="panel">
    <div class="panel-head"><div><div class="eyebrow">Evaluación cognitiva</div><h1>Atención sostenida (CPT deportivo)</h1></div>
      <button class="btn-ghost" onclick="window.volverDeTareaCognitiva()">← Volver</button></div>
    <p class="hint">Van a aparecer números. Hacé clic únicamente cuando veas el número 7.</p>
    ${result && result.completed ? renderCPTResults(result.scores) : ''}
    ${renderDifficultySelector('atencion_sostenida')}
  </div>`;
}
window.iniciarAtencionSostenida = function(dificultad){
  const p = CPT_PARAMS[dificultad];
  cog = {task:'atencion_sostenida', dificultad, params:p, trials:[], current:null, currentIsTarget:false, responded:false, startTime:Date.now(), stimulusTime:0};
  activeView='atencion_sostenida'; render();
  cptTick();
};
function cptTick(){
  if(!cog || cog.task!=='atencion_sostenida') return;
  const elapsed = (Date.now()-cog.startTime)/1000;
  if(elapsed>=cog.params.durationSec){ return finishCPT(); }
  if(cog.current!==null && !cog.responded){
    cog.trials.push({digit:cog.current, isTarget:cog.currentIsTarget, responded:false, rt:null});
  }
  const isTarget = Math.random()<cog.params.targetRatio;
  let d;
  if(isTarget){ d = 7; } else { do{ d = Math.floor(Math.random()*10); } while(d===7); }
  cog.current = d;
  cog.currentIsTarget = isTarget;
  cog.responded = false;
  cog.stimulusTime = Date.now();
  renderCPTStage();
  cog.stimTimeoutId = setTimeout(cptTick, cog.params.isi);
}
function renderCPTStage(){
  const el = document.getElementById('cptStage');
  if(!el) return;
  const elapsed = Math.round((Date.now()-cog.startTime)/1000);
  const remaining = Math.max(0, cog.params.durationSec - elapsed);
  el.innerHTML = `<div class="cancel-toolbar"><div>Objetivo: hacé clic solo con el número <strong>7</strong></div><div class="cancel-timer">${remaining}s</div></div>
    <div onclick="window.cptClick()" style="height:200px;border-radius:10px;background:#F1F6F9;display:flex;align-items:center;justify-content:center;font-size:64px;font-weight:700;color:var(--primary-dark);cursor:pointer;">${cog.current}</div>`;
}
window.cptClick = function(){
  if(!cog || cog.task!=='atencion_sostenida' || cog.responded) return;
  cog.responded = true;
  const rt = Date.now()-cog.stimulusTime;
  cog.trials.push({digit:cog.current, isTarget:cog.currentIsTarget, responded:true, rt});
};
function finishCPT(){
  clearTimeout(cog.stimTimeoutId);
  const trials = cog.trials;
  const dificultad = cog.dificultad;
  const targets = trials.filter(t=>t.isTarget);
  const nonTargets = trials.filter(t=>!t.isTarget);
  const hits = targets.filter(t=>t.responded);
  const omissions = targets.filter(t=>!t.responded);
  const falseAlarms = nonTargets.filter(t=>t.responded);
  const meanRt = hits.length? Math.round(hits.reduce((a,b)=>a+b.rt,0)/hits.length):null;
  const half = Math.floor(targets.length/2);
  const firstHalf = targets.slice(0,half);
  const secondHalf = targets.slice(half);
  const firstHalfHitRate = firstHalf.length? firstHalf.filter(t=>t.responded).length/firstHalf.length : null;
  const secondHalfHitRate = secondHalf.length? secondHalf.filter(t=>t.responded).length/secondHalf.length : null;
  const scores = {
    targetsTotal: targets.length, hits: hits.length, omissions: omissions.length,
    falseAlarms: falseAlarms.length, meanRt, firstHalfHitRate, secondHalfHitRate,
  };
  guardarResultadoCognitivo('atencion_sostenida', dificultad, trials, scores);
}
function renderCPTResults(s){
  const decline = (s.firstHalfHitRate!==null && s.secondHalfHitRate!==null) ? (s.firstHalfHitRate - s.secondHalfHitRate) : null;
  return `<div class="score-grid">
    ${scoreCardHtml('Aciertos', s.hits+' / '+s.targetsTotal, s.targetsTotal && (s.hits/s.targetsTotal)>=0.85?'verde':'amarillo')}
    ${scoreCardHtml('Omisiones', s.omissions, s.omissions<=2?'verde':(s.omissions<=5?'amarillo':'rojo'))}
    ${scoreCardHtml('Falsas alarmas', s.falseAlarms, s.falseAlarms<=2?'verde':(s.falseAlarms<=5?'amarillo':'rojo'))}
    ${scoreCardHtml('Tiempo medio', (s.meanRt||'—')+' ms', 'verde')}
    ${decline!==null? scoreCardHtml('Caída atencional (1ª vs 2ª mitad)', Math.round(decline*100)+' pts', decline<=0.1?'verde':(decline<=0.25?'amarillo':'rojo')) : ''}
  </div><p class="hint">La "caída atencional" compara el % de aciertos en la primera mitad de la tarea vs. la segunda. Valores altos indican fatiga atencional progresiva.</p>`;
}

/* ---------- 4) Memoria de trabajo (n-back) ---------- */
const NBACK_PARAMS = {
  principiante: {n:1, trials:20, isi:2200},
  intermedio: {n:2, trials:24, isi:2000},
  avanzado: {n:3, trials:28, isi:1800},
};
const NBACK_LETTERS = ['A','B','C','D','E','F'];
function viewMemoriaNback(){
  if(cog && cog.task==='memoria_nback'){
    return `<div class="panel">
      <div class="panel-head"><div><div class="eyebrow">Memoria de trabajo · ${cog.dificultad}</div><h1>${cog.params.n}-back</h1></div></div>
      <div id="nbackStage"></div>
    </div>`;
  }
  const result = moduleResults.memoria_nback;
  return `<div class="panel">
    <div class="panel-head"><div><div class="eyebrow">Evaluación cognitiva</div><h1>Memoria de trabajo (n-back)</h1></div>
      <button class="btn-ghost" onclick="window.volverDeTareaCognitiva()">← Volver</button></div>
    <p class="hint">Van a aparecer letras una por una. Tocá el botón si la letra actual es igual a la de "n" pasos atrás.</p>
    ${result && result.completed ? renderNbackResults(result.scores) : ''}
    ${renderDifficultySelector('memoria_nback')}
  </div>`;
}
window.iniciarMemoriaNback = function(dificultad){
  const p = NBACK_PARAMS[dificultad];
  const sequence = [];
  for(let i=0;i<p.trials;i++){
    if(i>=p.n && Math.random()<0.35){ sequence.push(sequence[i-p.n]); }
    else { sequence.push(pick(NBACK_LETTERS)); }
  }
  cog = {task:'memoria_nback', dificultad, params:p, sequence, index:0, responded:false, results:[], stimulusTime:0};
  activeView='memoria_nback'; render();
  nbackTick();
};
function nbackTick(){
  if(!cog || cog.task!=='memoria_nback') return;
  if(cog.index>=cog.sequence.length) return finishNback();
  cog.responded = false;
  cog.stimulusTime = Date.now();
  renderNbackStage();
  cog.timeoutId = setTimeout(()=>{
    if(!cog || cog.task!=='memoria_nback') return;
    const isMatch = cog.index>=cog.params.n && cog.sequence[cog.index]===cog.sequence[cog.index-cog.params.n];
    cog.results.push({letter:cog.sequence[cog.index], isMatch, responded:cog.responded, rt: cog.responded? (Date.now()-cog.stimulusTime): null});
    cog.index++;
    nbackTick();
  }, cog.params.isi);
}
function renderNbackStage(){
  const el = document.getElementById('nbackStage');
  if(!el) return;
  el.innerHTML = `<div style="height:180px;border-radius:10px;background:#F1F6F9;display:flex;align-items:center;justify-content:center;font-size:64px;font-weight:700;color:var(--primary-dark);">${cog.sequence[cog.index]}</div>
    <div class="btn-row"><button class="btn-primary" onclick="window.nbackRespond()">Coincide con ${cog.params.n} atrás</button></div>
    <p class="hint">Ítem ${cog.index+1} de ${cog.sequence.length}</p>`;
}
window.nbackRespond = function(){
  if(!cog || cog.task!=='memoria_nback' || cog.responded) return;
  cog.responded = true;
};
function finishNback(){
  const results = cog.results;
  const dificultad = cog.dificultad;
  const n = cog.params.n;
  const matches = results.filter(r=>r.isMatch);
  const nonMatches = results.filter(r=>!r.isMatch);
  const hits = matches.filter(r=>r.responded);
  const misses = matches.filter(r=>!r.responded);
  const falseAlarms = nonMatches.filter(r=>r.responded);
  const correctRejections = nonMatches.filter(r=>!r.responded);
  const scores = {
    n, matchesTotal: matches.length, hits: hits.length, misses: misses.length,
    falseAlarms: falseAlarms.length, correctRejections: correctRejections.length,
    precision: matches.length? Math.round((hits.length/matches.length)*100):0,
  };
  guardarResultadoCognitivo('memoria_nback', dificultad, results, scores);
}
function renderNbackResults(s){
  return `<div class="score-grid">
    ${scoreCardHtml('Nivel (n-back)', s.n, 'verde')}
    ${scoreCardHtml('Aciertos', s.hits+' / '+s.matchesTotal, s.precision>=80?'verde':(s.precision>=60?'amarillo':'rojo'))}
    ${scoreCardHtml('Precisión', s.precision+'%', s.precision>=80?'verde':(s.precision>=60?'amarillo':'rojo'))}
    ${scoreCardHtml('Falsas alarmas', s.falseAlarms, s.falseAlarms<=2?'verde':(s.falseAlarms<=5?'amarillo':'rojo'))}
    ${scoreCardHtml('Rechazos correctos', s.correctRejections, 'verde')}
  </div><p class="hint">Precisión ≥80% adecuada · 60-79% moderada · &lt;60% baja para el nivel aplicado.</p>`;
}

/* ---------- Interpretación cruzada de la Tanda 4 ---------- */
function buildInterpretacionCognitiva(){
  const rs = moduleResults.reaction_simple.scores;
  const rc = moduleResults.reaction_choice.scores;
  const cpt = moduleResults.atencion_sostenida.scores;
  const nb = moduleResults.memoria_nback.scores;
  const lines = [];

  if(rs.sd>100) lines.push('El tiempo de reacción simple muestra alta variabilidad (SD elevada), lo que sugiere inconsistencia en la respuesta más que lentitud generalizada.');
  const commissionRate = rc.noGoTotal? rc.commissions/rc.noGoTotal : 0;
  if(commissionRate>0.3) lines.push('La tarea Go/No-Go muestra una tasa alta de errores de comisión (responder cuando no debía), un indicador conductual de impulsividad.');
  if(cpt.omissions>5 || (cpt.firstHalfHitRate!==null && cpt.secondHalfHitRate!==null && (cpt.firstHalfHitRate-cpt.secondHalfHitRate)>0.25)){
    lines.push('La atención sostenida muestra una caída relevante en la segunda mitad de la tarea, compatible con fatiga atencional progresiva.');
  }
  if(nb.precision<60) lines.push(`La memoria de trabajo (${nb.n}-back) muestra una precisión baja para el nivel aplicado.`);

  // Cruce con tandas anteriores
  if(moduleResults.mood && moduleResults.mood.completed){
    const mood = moduleResults.mood.scores;
    if(cpt.omissions>5 && mood.fatiga>=3) lines.push('Las omisiones en la atención sostenida son consistentes con la fatiga reportada en el estado de ánimo — vale la pena considerar el estado de recuperación física antes de sacar conclusiones puramente cognitivas.');
  }
  if(moduleResults.csai2 && moduleResults.csai2.completed){
    const csai = moduleResults.csai2.scores;
    if(commissionRate>0.3 && csai.somatica>=3) lines.push('La impulsividad conductual (comisiones en Go/No-Go) junto con la activación somática elevada del CSAI-2R sugiere que la ansiedad podría estar afectando el control inhibitorio, no solo el estado emocional.');
  }
  if(moduleResults.pss14 && moduleResults.pss14.completed){
    const pss = moduleResults.pss14.scores;
    if(rs.sd>100 && pss.total>=27) lines.push('La inconsistencia en el tiempo de reacción simple es consistente con el alto estrés percibido general (PSS-14), que suele afectar la estabilidad del rendimiento cognitivo.');
  }

  let sintesis;
  const riesgos = [rs.sd>100, commissionRate>0.3, cpt.omissions>5, nb.precision<60].filter(Boolean).length;
  if(riesgos===0){
    sintesis = 'El perfil cognitivo evaluado es adecuado en las 4 tareas. Se recomienda mantener el nivel de dificultad actual o subirlo en la próxima evaluación para seguir desafiando estas capacidades.';
  } else if(riesgos<=2){
    sintesis = 'Hay 1-2 áreas cognitivas a reforzar. Se sugiere trabajo específico (ver biblioteca de técnicas de atención/concentración) y reevaluar con el mismo nivel de dificultad en unas semanas para medir progreso.';
  } else {
    sintesis = 'Múltiples áreas cognitivas muestran dificultad concurrente. Antes de intervenir cognitivamente, vale la pena revisar factores de base (fatiga, sueño, estrés) que podrían estar afectando transversalmente el rendimiento en todas las tareas.';
  }

  return lines.map(l=>`<p>${l}</p>`).join('') + `<p><strong>${sintesis}</strong></p>`;
}

function sparklineSVG(values, opts){
  opts = opts||{};
  const w = opts.width||220, h = opts.height||40;
  if(values.length===0) return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}"></svg>`;
  const min = opts.min!=null? opts.min : Math.min(...values);
  const max = opts.max!=null? opts.max : Math.max(...values);
  const range = (max-min)||1;
  const step = values.length>1 ? w/(values.length-1) : 0;
  const pts = values.map((v,i)=> `${(i*step).toFixed(1)},${(h-2 - ((v-min)/range)*(h-4)).toFixed(1)}`).join(' ');
  const color = opts.color || 'var(--primary)';
  const lastX = ((values.length-1)*step).toFixed(1);
  const lastY = (h-2 - ((values[values.length-1]-min)/range)*(h-4)).toFixed(1);
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${lastX}" cy="${lastY}" r="3.5" fill="${color}"/></svg>`;
}

function wellnessAlert(){
  if(wellnessCheckins.length<3) return null;
  const ultimos3 = wellnessCheckins.slice(-3);
  const avgFatiga = ultimos3.reduce((a,b)=>a+(b.fatiga_fisica||0),0)/3;
  const avgSueno = ultimos3.reduce((a,b)=>a+(b.sueno_calidad||0),0)/3;
  const avgEstres = ultimos3.reduce((a,b)=>a+(b.estres||0),0)/3;
  if(avgFatiga>=5.5 && avgSueno<=3){
    return 'Los últimos 3 registros muestran fatiga física alta combinada con mala calidad de sueño. Posible riesgo de sobrecarga — se sugiere revisar la carga de entrenamiento con el cuerpo técnico.';
  }
  if(avgEstres>=5.5 && avgFatiga>=5){
    return 'Los últimos 3 registros muestran estrés y fatiga elevados de forma sostenida. Vale la pena priorizar técnicas de regulación (respiración, relajación progresiva) y monitorear de cerca.';
  }
  return null;
}

window.iniciarTecnicaRespiracion = function(dificultad){

  activeView='respiracion'; render();
  respiracionTick();
};
function respiracionTick(){
  if(!tec || tec.key!=='respiracion') return;
  render();

    tec.phaseIdx++;
    if(tec.phaseIdx>=RESP_PHASES.length){
      tec.phaseIdx=0; tec.cycle++;
    }
    if(tec.cycle>=tec.totalCycles){
      guardarTechniqueLog('respiracion', {dificultad:tec.dificultad, cycles:tec.totalCycles}, `${tec.totalCycles} ciclos completos`).then(()=>{ tec=null; activeView='tecnicas'; render(); });

    }
    respiracionTick();
  }, 4000);
}

      indicador: ${esc(l.data.indicador)} · fecha objetivo: ${esc(l.data.fecha||'—')}
    </div>`).join('');
  return `<div class="panel">
    <div class="panel-head"><div><div class="eyebrow">Motivación</div><h1>Definición de metas</h1></div>
      <button class="btn-ghost" onclick="window.volverATecnicas()">← Volver</button></div>
    <p class="hint">Las metas de proceso (lo que el deportista controla directamente) suelen ser más protectoras que las metas de resultado (que dependen también de terceros).</p>
    <div class="grid2">
      <div><label>Tipo de meta</label><select id="mt_tipo"><option value="proceso">De proceso</option><option value="resultado">De resultado</option></select></div>
      <div><label>Fecha objetivo</label><input type="date" id="mt_fecha"></div>
    </div>
    <label>Meta</label><input type="text" id="mt_meta" placeholder="Ej. mantener el 80% de efectividad en tiros libres en entrenamiento">

    ${rows? `<div class="tec-history"><strong style="font-size:12.5px;color:var(--gray);">Metas registradas</strong>${rows}</div>`:''}
  </div>`;
}
window.guardarMeta = async function(){

    <div class="grid2">
      <div style="grid-column:1/3;"><label>Paso</label><input type="text" id="rt_paso" placeholder="Ej. Respirar 3 veces profundo mirando el aro"></div>

window.agregarPasoRutina = function(){

window.quitarPasoRutina = function(i){ tec.pasos.splice(i,1); render(); };
window.guardarRutina = async function(){
  if(!tec.pasos.length){ document.getElementById('rutinaMsg').innerHTML = `<div class="error-box">Agregá al menos un paso.</div>`; return; }
  const ok = await guardarTechniqueLog('rutina_precompetitiva', {pasos:tec.pasos}, `${tec.pasos.length} pasos`);
  if(ok){ tec = {key:'rutina_builder', pasos:[]}; render(); }
};

/* ---------- 9) Toma de decisiones bajo presión ---------- */
const DECISION_PARAMS = {
  principiante: {zones:3, timeLimit:5000, trials:8},
  intermedio: {zones:4, timeLimit:3800, trials:10},
  avanzado: {zones:5, timeLimit:2800, trials:12},
};
function viewTomaDecisiones(){
  if(tec && tec.key==='toma_decisiones'){
    return `<div class="panel">
      <div class="panel-head"><div><div class="eyebrow">Toma de decisiones · ${tec.dificultad}</div><h1>Ensayo ${Math.min(tec.currentTrial+1,tec.params.trials)} de ${tec.params.trials}</h1></div></div>
      <div id="decisionStage"></div>
    </div>`;
  }
  return `<div class="panel">
    <div class="panel-head"><div><div class="eyebrow">Toma de decisiones</div><h1>Toma de decisiones bajo presión</h1></div>
      <button class="btn-ghost" onclick="window.volverATecnicas()">← Volver</button></div>
    <p class="hint">Van a aparecer varias zonas numeradas (representan oportunidades de distinto valor, como un compañero libre vs. marcado). Elegí la de MAYOR número antes de que se acabe el tiempo. Entrena el escaneo visual rápido y la calidad de la elección bajo presión de tiempo.</p>
    ${renderDifficultySelector('toma_decisiones')}
    ${historialHtml('toma_decisiones')}
  </div>`;
}
window.iniciarTecnicaDecisiones = function(dificultad){
  const p = DECISION_PARAMS[dificultad];
  tec = { key:'toma_decisiones', dificultad, params:p, currentTrial:0, results:[] };
  activeView='toma_decisiones'; render();
  setTimeout(nextDecisionTrial, 400);
};
function nextDecisionTrial(){
  if(!tec || tec.key!=='toma_decisiones') return;
  if(tec.currentTrial>=tec.params.trials) return finishDecisiones();
  const values = [];
  while(values.length<tec.params.zones){
    const v = 1+Math.floor(Math.random()*9);
    if(!values.includes(v)) values.push(v);
  }
  tec.currentValues = values;
  tec.correctIndex = values.indexOf(Math.max(...values));
  tec.stimulusTime = Date.now();
  tec.responded = false;
  renderDecisionStage();
  tec.timeoutId = setTimeout(()=>{
    if(!tec || tec.key!=='toma_decisiones') return;
    if(!tec.responded){
      tec.results.push({values:tec.currentValues, chosen:null, correct:false, rt:null});
      tec.currentTrial++;
      nextDecisionTrial();
    }
  }, tec.params.timeLimit);
}
function renderDecisionStage(){
  const el = document.getElementById('decisionStage');
  if(!el) return;
  const boxes = tec.currentValues.map((v,i)=>`<div onclick="window.decisionClick(${i})" style="width:90px;height:90px;border-radius:10px;background:#F1F6F9;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--primary-dark);cursor:pointer;">${v}</div>`).join('');
  el.innerHTML = `<p class="hint">Elegí la zona con el número más alto — tenés hasta ${(tec.params.timeLimit/1000).toFixed(1)}s.</p>
    <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;">${boxes}</div>`;
}
window.decisionClick = function(i){
  if(!tec || tec.key!=='toma_decisiones' || tec.responded) return;
  tec.responded = true;
  clearTimeout(tec.timeoutId);
  const rt = Date.now()-tec.stimulusTime;
  const correct = i===tec.correctIndex;
  tec.results.push({values:tec.currentValues, chosen:i, correct, rt});
  tec.currentTrial++;
  nextDecisionTrial();
};
function finishDecisiones(){
  const results = tec.results;
  const dificultad = tec.dificultad;
  const correctCount = results.filter(r=>r.correct).length;
  const respondidos = results.filter(r=>r.rt!==null);
  const meanRt = respondidos.length? Math.round(respondidos.reduce((a,b)=>a+b.rt,0)/respondidos.length): null;
  const accuracy = Math.round((correctCount/results.length)*100);
  guardarTechniqueLog('toma_decisiones', {dificultad, trials:results.length, correctCount, meanRt, accuracy}, `${accuracy}% de aciertos, ${meanRt!==null? meanRt+' ms promedio':'sin respuestas a tiempo'} (${dificultad})`).then(()=>{ tec=null; activeView='tecnicas'; render(); });
}
